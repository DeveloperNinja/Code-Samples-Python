<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Counter App</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --accent: #e8d5b0;
    --accent-dim: #a89060;
    --text: #f0ece4;
    --muted: #6b6560;
    --border: #2e2b27;
    --red: #c0392b;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,213,176,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,213,176,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3rem 4rem;
    text-align: center;
    position: relative;
    width: 340px;
    box-shadow: 0 0 60px rgba(232,213,176,0.04);
  }

  /* Corner tick marks */
  .card::before, .card::after {
    content: '';
    position: absolute;
    width: 12px;
    height: 12px;
    border-color: var(--accent-dim);
    border-style: solid;
  }
  .card::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
  .card::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

  .label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.5rem;
  }

  .count-display {
    font-family: 'Playfair Display', serif;
    font-size: 7rem;
    font-weight: 700;
    line-height: 1;
    color: var(--accent);
    letter-spacing: -0.02em;
    margin-bottom: 0.25rem;
    transition: transform 0.08s ease, color 0.15s ease;
    display: block;
    min-height: 1.1em;
  }

  .count-display.bump {
    transform: scale(1.08);
    color: #fff;
  }

  .count-display.negative {
    color: #e07070;
  }

  .step-info {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 2.5rem;
    min-height: 1.4em;
  }

  /* Main increment button */
  .btn-increment {
    display: block;
    width: 100%;
    padding: 1rem;
    background: var(--accent);
    color: #0d0d0d;
    border: none;
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.08s ease;
    margin-bottom: 1rem;
  }

  .btn-increment:hover { background: #f5e6c4; }
  .btn-increment:active { transform: scale(0.98); background: #d4be96; }

  /* Secondary controls row */
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }

  .btn-secondary {
    padding: 0.6rem;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }

  .btn-secondary:hover {
    color: var(--text);
    border-color: var(--muted);
    background: rgba(255,255,255,0.03);
  }

  .btn-secondary:active { transform: scale(0.97); }

  .btn-decrement:hover { color: #e07070; border-color: #7a3030; }
  .btn-reset:hover    { color: var(--accent); border-color: var(--accent-dim); }

  /* Step selector */
  .step-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 2rem;
  }

  .step-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .step-btn {
    width: 26px; height: 26px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.15s, border-color 0.15s;
    line-height: 1;
  }
  .step-btn:hover { color: var(--text); border-color: var(--muted); }

  .step-value {
    font-size: 13px;
    font-weight: 500;
    color: var(--accent-dim);
    min-width: 28px;
    text-align: center;
  }

  /* History bar */
  .history {
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
    min-height: 28px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .hist-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.3s;
    flex-shrink: 0;
  }

  .hist-dot.up   { background: var(--accent-dim); }
  .hist-dot.down { background: #a03030; }

  .hist-label {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: 4px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="label">counter_v1.py</div>

  <span class="count-display" id="count">0</span>
  <div class="step-info" id="step-info">&nbsp;</div>

  <!-- Step selector -->
  <div class="step-row">
    <span class="step-label">step</span>
    <button class="step-btn" id="step-down">−</button>
    <span class="step-value" id="step-val">1</span>
    <button class="step-btn" id="step-up">+</button>
  </div>

  <!-- Main button -->
  <button class="btn-increment" id="btn-inc" onclick="increment()">
    ++ increment
  </button>

  <!-- Secondary row -->
  <div class="controls">
    <button class="btn-secondary btn-decrement" onclick="decrement()">-- decrement</button>
    <button class="btn-secondary"              onclick="undo()">↩ undo</button>
    <button class="btn-secondary btn-reset"    onclick="resetCounter()">⟳ reset</button>
  </div>

  <!-- History -->
  <div class="history" id="history">
    <span class="hist-label">log</span>
  </div>
</div>

<script>
  let count = 0;
  let step = 1;
  let history = [];
  const MAX_HIST = 12;

  const countEl   = document.getElementById('count');
  const stepVal   = document.getElementById('step-val');
  const stepInfo  = document.getElementById('step-info');
  const histEl    = document.getElementById('history');

  function setCount(val, direction) {
    history.push({ val: count, dir: direction });
    if (history.length > MAX_HIST) history.shift();
    count = val;
    render(direction);
  }

  function increment() {
    setCount(count + step, 'up');
  }

  function decrement() {
    setCount(count - step, 'down');
  }

  function undo() {
    if (history.length === 0) return;
    const last = history.pop();
    count = last.val;
    render('undo');
  }

  function resetCounter() {
    history = [];
    count = 0;
    render('reset');
  }

  function render(action) {
    countEl.textContent = count;
    countEl.classList.toggle('negative', count < 0);

    // Bump animation
    countEl.classList.remove('bump');
    void countEl.offsetWidth;
    if (action !== 'reset') countEl.classList.add('bump');
    setTimeout(() => countEl.classList.remove('bump'), 120);

    // Step info
    if (action === 'up')    stepInfo.textContent = `+${step}`;
    else if (action === 'down')  stepInfo.textContent = `-${step}`;
    else if (action === 'undo')  stepInfo.textContent = 'undone';
    else if (action === 'reset') stepInfo.textContent = 'reset to 0';

    // History dots
    histEl.innerHTML = '<span class="hist-label">log</span>';
    history.forEach(h => {
      const d = document.createElement('div');
      d.className = 'hist-dot ' + (h.dir === 'up' ? 'up' : 'down');
      histEl.appendChild(d);
    });
  }

  // Step controls
  document.getElementById('step-up').addEventListener('click', () => {
    step = Math.min(step + 1, 100);
    stepVal.textContent = step;
  });

  document.getElementById('step-down').addEventListener('click', () => {
    step = Math.max(step - 1, 1);
    stepVal.textContent = step;
  });

  // Keyboard support
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowUp'   || e.key === '+') increment();
    if (e.key === 'ArrowDown' || e.key === '-') decrement();
    if (e.key === 'z' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); undo(); }
    if (e.key === 'r') resetCounter();
  });
</script>
</body>
</html>
